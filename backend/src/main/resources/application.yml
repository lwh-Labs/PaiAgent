server:
  port: 8080

spring:
  application:
    name: pai-agent

  # H2 内存数据库配置（开发模式，无需安装 MySQL）
  datasource:
    url: jdbc:h2:file:./data/paiagent;AUTO_SERVER=TRUE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 控制台（可通过 http://localhost:8080/h2-console 访问）
  h2:
    console:
      enabled: true
      path: /h2-console

  # 禁用 schema.sql 自动执行
  sql:
    init:
      mode: never

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# 日志配置
logging:
  level:
    com.paiagent: DEBUG
    org.hibernate.SQL: DEBUG
